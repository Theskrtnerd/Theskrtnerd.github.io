name: Publish to GH Pages
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build static site
        run: npm run build

      - name: Checkout destination
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: built-site

      - name: Replace built-site contents
        run: |
          find built-site -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R out/. built-site/
          touch built-site/.nojekyll

      - name: Deploy
        run: |
          cd built-site
          git config user.name 'Theskrtnerd'
          git config user.email 'tvbbd2@gmail.com'
          git add .
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m 'Updated site'
            git push
          else
            echo "No changes to commit"
          fi
